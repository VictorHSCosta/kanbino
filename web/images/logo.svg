<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#gradient)" stroke="none"/>

  <!-- Kanban board representation -->
  <rect x="20" y="25" width="25" height="70" rx="3" fill="white" fill-opacity="0.9"/>
  <rect x="47.5" y="25" width="25" height="70" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="75" y="25" width="25" height="70" rx="3" fill="white" fill-opacity="0.5"/>

  <!-- Cards in columns -->
  <rect x="24" y="35" width="17" height="12" rx="2" fill="#2563eb"/>
  <rect x="24" y="50" width="17" height="12" rx="2" fill="#10b981"/>
  <rect x="24" y="65" width="17" height="12" rx="2" fill="#f59e0b"/>

  <rect x="51.5" y="40" width="17" height="12" rx="2" fill="#ef4444"/>
  <rect x="51.5" y="60" width="17" height="12" rx="2" fill="#8b5cf6"/>

  <rect x="79" y="45" width="17" height="12" rx="2" fill="#06b6d4"/>
  <rect x="79" y="65" width="17" height="12" rx="2" fill="#ec4899"/>

  <!-- Terminal command line indicator -->
  <rect x="15" y="105" width="90" height="3" rx="1.5" fill="white" fill-opacity="0.8"/>
  <circle cx="22" cy="106.5" r="2" fill="#10b981"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>