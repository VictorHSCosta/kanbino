# frozen_string_literal: true

# Configuração básica do RuboCop para o projeto gemkanbino
# Para mais informações: https://docs.rubocop.org/rubocop/configuration.html

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'bin/**/*'
    - 'tmp/**/*'
    - 'vendor/**/*'
    - '.git/**/*'

# Layout e formatação
Layout/LineLength:
  Max: 120

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

# Metrics
Metrics/AbcSize:
  Max: 25

Metrics/BlockLength:
  Max: 30
  Exclude:
    - 'spec/**/*'
    - 'Gemfile'
    - 'Rakefile'

Metrics/ClassLength:
  Max: 200

Metrics/MethodLength:
  Max: 20

Metrics/ModuleLength:
  Max: 200

# Convenções de nomenclatura
Naming/FileName:
  Enabled: true

# Style guidelines
Style/Alias:
  EnforcedStyle: prefer_alias_method

Style/AndOr:
  Enabled: true

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/HashSyntax:
  EnforcedStyle: ruby19

Style/Lambda:
  EnforcedStyle: lambda

Style/NumericLiterals:
  Enabled: true

Style/RaiseArgs:
  EnforcedStyle: compact

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/SymbolArray:
  EnforcedStyle: brackets

Style/WordArray:
  EnforcedStyle: brackets

Style/TrailingCommaInArrayLiteral:
  Enabled: false

Style/TrailingCommaInHashLiteral:
  Enabled: false

Style/PercentLiteralDelimiters:
  Enabled: true

Style/RedundantReturn:
  Enabled: true

Style/RedundantSelf:
  Enabled: true